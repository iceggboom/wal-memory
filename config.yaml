# AI Memory Platform 配置
# 所有配置集中在此文件，无需设置环境变量

# API 认证
api_keys:
  test-app: "test-key-123"

# LLM 配置（Walmart 内部 LLM 网关）
llm:
  provider: "wal"
  model: "DeepSeekV3.1"
  wal_base_url: "https://mdc-qa-aloha-gateway.cn.wal-mart.com/genai-platform/advancedApi/openAI"
  aloha_app_name: "reimbursement-service"
  access_token: "292D6AB5901113D8B3CEB3FA915AFA7A"

# 向量存储配置
vector_store:
  provider: "tencent_vector"
  config:
    url: "http://10.4.21.101:80"
    username: "root"
    key: "f1IYm0b0ivALeYU31Dz3efUuzRSieY4OJDs9asfx"
    collection_name: "memory"
    embedding_model_dims: 768
    database_name: "ai_platform"
    timeout: 30
    embedding_model: "bge-base-zh"
    mock: false

# Embedder 配置（mem0占位配置）
embedder:
  provider: "mock"
